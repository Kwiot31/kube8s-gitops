<!DOCTYPE html>
<html>
<head>
    <title>Moja Aplikacja K8s + GitOps</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; padding-top: 50px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #1a73e8; }
        p { color: #5f6368; }
        .status { color: #34a853; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Witaj w Świecie GitOps! 🚀</h1>
        <p>Ta strona jest serwowana z kontenera <strong>Apache (httpd)</strong>.</p>
        <p>Została wdrożona automatycznie przez <strong>ArgoCD</strong>.</p>
        <p class="status">Status: Działa i jest zarządzana przez GitHub!</p>
        <hr>
        <p><small>Edytuj plik <code>charts/my-app/index.html</code> i zrób push, aby zobaczyć zmianę!</small></p>
    </div>
</body>
</html>
